# Go Reviewer guild — QLoRA SFT recipe.
#
# Code-review tasks need deep context understanding, so we use the Qwen2.5-7B
# base with a high-rank LoRA. References below resolve against the configs/ root:
#   base_model: qwen2.5_7b -> configs/base_models/qwen2.5_7b.yaml
#   lora:       high_rank  -> configs/lora/high_rank.yaml
#
# Run:
#   anvil-train --config configs/guilds/go_reviewer.yaml
name: go_reviewer

base_model: qwen2.5_7b
lora: high_rank

dataset:
  path: "../../forge/data/datasets/go_reviewer_v1.jsonl"
  val_split: 0.05
  system_prompt: "You are a meticulous senior Go engineer performing code review."

output_dir: "./checkpoints/go_reviewer_adapter"

sft:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  epochs: 3
  group_by_length: true

# Optional preference tuning stage (run with `anvil-dpo`) once an SFT adapter
# exists and a chosen/rejected dataset has been produced.
dpo:
  beta: 0.1
  learning_rate: 5.0e-6
  epochs: 1
